name: get-chat-id

# One-off helper: prints chat id/type/title for every chat in the publisher bot's recent
# updates. Used to discover the VIP group's chat_id after adding the bot as admin. Safe — read
# only, prints no secrets. Delete after use.

on:
  workflow_dispatch:

jobs:
  getid:
    runs-on: ubuntu-latest
    steps:
      - name: getUpdates -> chats
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          t = os.environ["TELEGRAM_BOT_TOKEN"]
          d = json.load(urllib.request.urlopen(f"https://api.telegram.org/bot{t}/getUpdates?timeout=0"))
          seen = {}
          for u in d.get("result", []):
              for k in ("my_chat_member", "message", "channel_post", "chat_member", "edited_message"):
                  c = (u.get(k) or {}).get("chat")
                  if c:
                      seen[c["id"]] = (c.get("type"), c.get("title") or c.get("username"))
          print(f"total updates: {len(d.get('result', []))}")
          print("--- chats seen ---")
          for cid, (typ, title) in seen.items():
              print(f"{cid}  |  {typ}  |  {title}")
          if not seen:
              print("(no chats in recent updates — send any message inside the VIP group, then re-run)")
          PY
