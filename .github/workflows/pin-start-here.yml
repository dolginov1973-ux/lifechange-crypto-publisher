name: Pin Start-here

# Publish + pin the "Start here" welcome in every public channel (TG-Ads destination).
# Re-runnable: edit content/_broadcast/start-here-<id>/<lang>.json then dispatch to refresh
# the pinned message. dry_run defaults TRUE — flip to false to actually send + pin.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (gate-check only, no send/pin)'
        type: boolean
        default: true
      only:
        description: 'Limit to channel keys (comma list, e.g. ru). Empty = all.'
        required: false
        default: ''

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Publish + pin
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          COMMUNITY_LINK: ${{ secrets.COMMUNITY_LINK }}
          VIP_CHAT_ID: ${{ secrets.VIP_CHAT_ID }}
          DRY: ${{ inputs.dry_run == true && '1' || '0' }}
          ONLY: ${{ inputs.only }}
        run: node scripts/pin-start-here.mjs
