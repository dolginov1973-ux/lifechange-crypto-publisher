name: Delete broadcast (one-off)

# One-off helper: deletes the premature text-only SKR result messages so the verified
# screenshot P&L can replace them. Run once, then this workflow + scripts/delete-msgs.mjs
# are removed.

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Delete messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node scripts/delete-msgs.mjs
